name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # index.html at root is the React entry point — build it normally
      - name: Build React app
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SHEETS_WEBAPP_URL: ${{ secrets.VITE_SHEETS_WEBAPP_URL }}
        run: npm run build

      - name: Verify build
        run: |
          echo "=== dist/ ===" && ls dist/
          echo "=== dist/assets/ ===" && ls dist/assets/ | head -5

      # Move React build → docs/app/
      - name: Move React build → docs/app/
        run: |
          rm -rf docs/app
          cp -r dist docs/app
          echo "✓ docs/app updated"
          ls docs/app/

      # Copy our gateway (saved as gateway.html) → docs/index.html
      - name: Copy gateway → docs/index.html
        run: cp gateway.html docs/index.html

      # Copy ONLY the video pages from public/ → docs/
      # (explicit, targeted — never touches anything else already in docs/)
      - name: Copy videos.html and videos-config.js → docs/
        run: |
          cp public/videos.html docs/videos.html
          cp public/videos-config.js docs/videos-config.js
          echo "✓ videos.html and videos-config.js copied to docs/"

      - name: Create .nojekyll
        run: touch docs/.nojekyll

      - name: Commit docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: rebuild docs/ [skip ci]"
          git push origin main
