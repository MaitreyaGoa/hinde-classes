name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # Temporarily rename gateway so Vite doesn't pick it up
      - name: Hide gateway index.html from Vite
        run: mv index.html gateway.html

      # Now Vite finds the correct React index.html (public/index.html or src/index.html)
      - name: Build React app
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SHEETS_WEBAPP_URL: ${{ secrets.VITE_SHEETS_WEBAPP_URL }}
        run: npm run build

      # Restore gateway
      - name: Restore gateway
        run: mv gateway.html index.html

      # Verify React built with assets
      - name: Verify build
        run: |
          echo "=== dist/ ===" && ls dist/
          echo "=== dist/assets/ ===" && ls dist/assets/ | head -5

      # Clear old docs/app and put fresh React build there
      - name: Move React build → docs/app/
        run: |
          rm -rf docs/app
          cp -r dist docs/app
          echo "✓ docs/app updated"

      # Copy gateway to docs/index.html
      - name: Copy gateway → docs/index.html
        run: cp index.html docs/index.html

      - name: Create .nojekyll
        run: touch docs/.nojekyll

      - name: Commit docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: rebuild docs/ [skip ci]"
          git push origin main
