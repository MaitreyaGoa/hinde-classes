name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # STEP 1: Build React → docs/app/  (emptyOutDir clears old files)
      - name: Build React app
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SHEETS_WEBAPP_URL: ${{ secrets.VITE_SHEETS_WEBAPP_URL }}
        run: npm run build

      # STEP 2: AFTER build, copy gateway (so it doesn't get wiped by emptyOutDir)
      - name: Copy gateway index.html → docs/index.html
        run: |
          cp index.html docs/index.html
          echo "✓ Gateway copied"

      # STEP 3: Verify structure
      - name: Verify
        run: |
          echo "=== docs/ ===" && ls docs/
          echo "=== docs/app/ ===" && ls docs/app/

      # STEP 4: Prevent Jekyll
      - name: Create .nojekyll
        run: touch docs/.nojekyll

      # STEP 5: Commit back to main (Pages serves /docs on main)
      - name: Commit docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: rebuild docs/ [skip ci]"
          git push origin main
