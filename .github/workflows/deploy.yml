name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # Vite builds React app → docs/app/
      - name: Build React app
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== docs/ ===" && ls -la docs/
          echo "=== docs/app/ ===" && ls -la docs/app/ | head -15

      # Our 3-tile gateway is at repo root index.html
      # Copy it into docs/ → becomes hindeclasses.com/
      - name: Copy gateway → docs/index.html
        run: |
          cp index.html docs/index.html
          echo "✓ Gateway copied"

      # Prevent Jekyll from ignoring files starting with _
      - name: Create .nojekyll
        run: touch docs/.nojekyll

      # Commit docs/ back to main (Pages serves from docs/ on main)
      - name: Commit docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "Deploy: rebuild docs/ [skip ci]"
          git push origin main
