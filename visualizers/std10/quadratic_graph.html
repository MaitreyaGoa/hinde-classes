<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadratic Graph Explorer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#1f2937;padding:20px}
  h1{font-size:18px;font-weight:600;color:#0d5c73;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7280;margin-bottom:20px}
  .sliders{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:14px}
  .slider-group label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px}
  .slider-group input{width:100%}
  .slider-group .val{text-align:center;font-size:15px;font-weight:600;color:#0d5c73;margin-top:4px}
  .equation{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center;font-size:16px;font-weight:600;color:#1f2937;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .stat{background:white;border-radius:10px;padding:12px;text-align:center;border:1px solid #e5e7eb}
  .stat .name{font-size:11px;color:#9ca3af;margin-bottom:4px}
  .stat .value{font-size:14px;font-weight:600;color:#1f2937}
  canvas{width:100%;border-radius:10px;background:white;border:1px solid #e5e7eb}
</style>
</head>
<body>
<h1>Quadratic Graph Explorer</h1>
<div class="sub">Change a, b, c to see the parabola ax² + bx + c move live</div>
<div class="sliders">
  <div class="slider-group"><label>a (opens up/down)</label><input type="range" min="-3" max="3" value="1" step="0.5" id="qa"><div class="val" id="qa-out">a = 1</div></div>
  <div class="slider-group"><label>b (shifts left/right)</label><input type="range" min="-6" max="6" value="-3" step="1" id="qb"><div class="val" id="qb-out">b = -3</div></div>
  <div class="slider-group"><label>c (y-intercept)</label><input type="range" min="-8" max="8" value="2" step="1" id="qc"><div class="val" id="qc-out">c = 2</div></div>
</div>
<div class="equation" id="eq-display">y = x² − 3x + 2</div>
<div class="stats">
  <div class="stat"><div class="name">Discriminant (b²−4ac)</div><div class="value" id="disc-out">1</div></div>
  <div class="stat"><div class="name">Roots</div><div class="value" id="roots-out">1, 2</div></div>
  <div class="stat"><div class="name">Vertex</div><div class="value" id="vertex-out">(1.5, −0.25)</div></div>
  <div class="stat"><div class="name">Opens</div><div class="value" id="opens-out">Upward ∪</div></div>
</div>
<canvas id="quad-chart" height="250"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let qchart;
function qupdate(){
  const a=+document.getElementById('qa').value;
  const b=+document.getElementById('qb').value;
  const c=+document.getElementById('qc').value;
  document.getElementById('qa-out').textContent='a = '+a;
  document.getElementById('qb-out').textContent='b = '+b;
  document.getElementById('qc-out').textContent='c = '+c;
  const bStr=b<0?'− '+Math.abs(b)+'x':b===0?'':b===1?'+ x':'+ '+b+'x';
  const cStr=c<0?'− '+Math.abs(c):c===0?'':'+ '+c;
  const aStr=a===1?'x²':a===-1?'−x²':a+'x²';
  document.getElementById('eq-display').textContent='y = '+aStr+' '+bStr+' '+cStr;
  const disc=b*b-4*a*c;
  document.getElementById('disc-out').textContent=Math.round(disc*100)/100;
  let rootsText='';
  if(a===0){rootsText='Linear';}
  else if(disc>0){const r1=(-b+Math.sqrt(disc))/(2*a);const r2=(-b-Math.sqrt(disc))/(2*a);rootsText=(Math.round(r1*100)/100)+', '+(Math.round(r2*100)/100);}
  else if(disc===0){rootsText=Math.round(-b/(2*a)*100)/100+' (equal)';}
  else{rootsText='No real roots';}
  document.getElementById('roots-out').textContent=rootsText;
  const vx=a!==0?Math.round(-b/(2*a)*100)/100:'—';
  const vy=a!==0?Math.round((c-b*b/(4*a))*100)/100:'—';
  document.getElementById('vertex-out').textContent='('+vx+', '+vy+')';
  document.getElementById('opens-out').textContent=a>0?'Upward ∪':a<0?'Downward ∩':'Linear';
  const xs=[],ys=[];
  for(let x=-6;x<=6;x+=0.2){xs.push(Math.round(x*10)/10);ys.push(Math.round((a*x*x+b*x+c)*100)/100);}
  if(qchart){qchart.data.labels=xs;qchart.data.datasets[0].data=ys;qchart.update();}
  else{qchart=new Chart(document.getElementById('quad-chart'),{type:'line',data:{labels:xs,datasets:[{label:'y',data:ys,borderColor:'#0d5c73',borderWidth:2.5,pointRadius:0,tension:0.4,fill:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:-10,max:15,grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{maxTicksLimit:7},grid:{color:'rgba(0,0,0,0.03)'}}}}});}
}
['qa','qb','qc'].forEach(id=>document.getElementById(id).addEventListener('input',qupdate));
qupdate();
</script>
</body>
</html>
