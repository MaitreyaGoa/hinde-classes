<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Short concept videos by Hinde Classes — quick explainers for tricky topics across Maths, Science and more."/>
<title>Concept Videos · Hinde Classes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased;
}

/* ══ NAV ══════════════════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:200;
  background:rgba(245,245,247,0.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  padding:0 40px;
}
.nav-inner{
  max-width:1080px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;height:44px;
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
.nav-name{font-size:13px;font-weight:700;color:#1d1d1f;}
.nav-back{
  font-size:12px;font-weight:600;color:#0d9488;text-decoration:none;
  padding:6px 14px;border-radius:20px;transition:background .15s;
}
.nav-back:hover{background:rgba(13,148,136,0.08);}

/* ══ HEADER ══════════════════════════════════════════════ */
.vh-header{background:#fff;padding:28px 40px 22px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.06);}
.vh-header-inner{max-width:680px;margin:0 auto;}
.vh-eyebrow{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0d9488;margin-bottom:8px;}
.vh-title{font-size:1.7rem;font-weight:800;letter-spacing:-0.6px;color:#1d1d1f;margin-bottom:8px;}
.vh-sub{font-size:13px;color:#6e6e73;line-height:1.6;}

/* ══ GRID ════════════════════════════════════════════════ */
.vh-wrap{max-width:1080px;margin:0 auto;padding:28px 40px 60px;}
.vh-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.vcard{
  background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:16px;
  overflow:hidden;text-decoration:none;color:inherit;
  transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;
}
.vcard:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,0.1);}
.vcard-thumb{
  aspect-ratio:16/9;background:linear-gradient(135deg,#0d9488,#0f766e);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.vcard-play{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#0d9488;
  transition:transform .18s;
}
.vcard:hover .vcard-play{transform:scale(1.1);}
.vcard-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,0.5);color:#fff;
  font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;
  backdrop-filter:blur(4px);
}
.vcard-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;}
.vcard-title{font-size:14px;font-weight:700;color:#1d1d1f;margin-bottom:4px;line-height:1.35;}
.vcard-sub{font-size:11.5px;color:#6e6e73;margin-bottom:8px;}
.vcard-meta{
  margin-top:auto;display:flex;align-items:center;gap:6px;
  font-size:11px;color:#0d9488;font-weight:600;
}

.vh-empty{
  text-align:center;padding:60px 20px;color:#86868b;font-size:13px;
}

@media(max-width:700px){
  .nav{padding:0 20px;}
  .vh-header{padding:20px 20px 18px;}
  .vh-wrap{padding:20px 20px 40px;}
  .vh-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="gateway.html" class="nav-brand">
      <div class="nav-name">Hinde Classes</div>
    </a>
    <a href="gateway.html" class="nav-back">← Home</a>
  </div>
</nav>

<header class="vh-header">
  <div class="vh-header-inner">
    <div class="vh-eyebrow">Watch &amp; Learn</div>
    <div class="vh-title">Short Concept Videos</div>
    <p class="vh-sub">Quick explainer clips to help tricky topics click. Tap any video to watch.</p>
  </div>
</header>

<div class="vh-wrap">
  <div class="vh-grid" id="videoGrid"></div>
  <div class="vh-empty" id="emptyState" style="display:none;">No videos yet — check back soon!</div>
</div>

<script src="videos-config.js"></script>
<script>
function renderVideos() {
  var grid  = document.getElementById("videoGrid");
  var list  = window.ALL_VIDEOS || [];

  if (!list.length) {
    document.getElementById("emptyState").style.display = "block";
    return;
  }

  grid.innerHTML = list.map(function(v) {
    return '<a href="' + v.url + '" target="_blank" rel="noopener" class="vcard">'
      + '<div class="vcard-thumb">'
      +   '<span class="vcard-badge">' + (v.subject || "Video") + '</span>'
      +   '<div class="vcard-play">▶</div>'
      + '</div>'
      + '<div class="vcard-body">'
      +   '<div class="vcard-title">' + esc(v.title) + '</div>'
      +   (v.chapter ? '<div class="vcard-sub">' + esc(v.chapter) + '</div>' : '')
      +   '<div class="vcard-meta">▶ Watch on ' + (v.platform || "Facebook") + '</div>'
      + '</div>'
      + '</a>';
  }).join("");
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

window.addEventListener("DOMContentLoaded", renderVideos);
</script>

</body>
</html>
