<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Test — Hinde Classes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;}
:root{--acc:#0d9488;--acc-lt:#14b8a6;--acc-bg:#f0fdfa;}

/* ── HEADER ── */
.hdr{background:rgba(245,245,247,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.08);position:sticky;top:0;z-index:200;padding:0 24px;}
.hdr-in{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;gap:12px;}
.back-link{font-size:13px;font-weight:500;color:#86868b;text-decoration:none;white-space:nowrap;transition:color .15s;}
.back-link:hover{color:#1d1d1f;}
.hdr-test-name{font-size:13px;font-weight:600;color:#1d1d1f;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timer{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:5px 14px;font-size:14px;font-weight:700;min-width:80px;justify-content:center;white-space:nowrap;}
.timer.warn{color:#ff3b30;border-color:rgba(255,59,48,0.3);background:#fff0ef;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ════════ LOGIN SCREEN ════════ */
.login-page{min-height:calc(100vh - 52px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 20px;}
.login-card{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,0.08);padding:40px 36px;width:100%;max-width:460px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.login-breadcrumb{display:inline-flex;align-items:center;gap:6px;background:var(--acc-bg);color:var(--acc);border:1px solid rgba(13,148,136,0.2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:20px;}
.login-title{font-size:1.75rem;font-weight:800;letter-spacing:-.5px;color:#1d1d1f;margin-bottom:6px;}
.login-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.meta-pill{font-size:11px;font-weight:600;color:#3a3a3c;background:#f5f5f7;border-radius:6px;padding:3px 9px;}
.login-desc{font-size:13px;color:#86868b;margin-bottom:28px;line-height:1.6;}
.f-label{display:block;font-size:12px;font-weight:600;color:#3a3a3c;margin-bottom:6px;}
.f-input{width:100%;padding:12px 14px;background:#f5f5f7;border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-size:14px;color:#1d1d1f;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .15s,background .15s;}
.f-input:focus{border-color:var(--acc);background:#fff;}
.login-error{color:#ff3b30;font-size:12px;margin-bottom:12px;display:none;padding:8px 12px;background:#fff0ef;border-radius:7px;}
.btn-unlock{width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:-.2px;transition:background .15s;}
.btn-unlock:hover{background:#0f766e;}

/* Toppers on login page */
.login-toppers{width:100%;max-width:460px;margin-top:20px;}

/* ════════ QUIZ SCREEN ════════ */
.quiz-page{max-width:800px;margin:0 auto;padding:28px 20px 80px;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.progress-track{flex:1;background:rgba(0,0,0,0.07);border-radius:4px;height:5px;overflow:hidden;}
.progress-fill{height:100%;background:var(--acc);border-radius:4px;transition:width .4s;}
.progress-lbl{font-size:11px;font-weight:600;color:#86868b;white-space:nowrap;}

.q-card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.07);padding:24px;margin-bottom:10px;}
.q-num{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.q-text{font-size:15px;font-weight:500;color:#1d1d1f;line-height:1.65;margin-bottom:18px;}
.q-opts{display:flex;flex-direction:column;gap:8px;}
.q-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid rgba(0,0,0,0.09);border-radius:10px;cursor:pointer;font-size:13px;color:#3a3a3c;background:#fff;transition:all .12s;user-select:none;}
.q-opt:hover:not(.answered){border-color:var(--acc);background:var(--acc-bg);}
.q-opt.selected{border-color:var(--acc);background:var(--acc-bg);color:var(--acc);font-weight:600;}
.q-opt.correct{border-color:#34c759;background:#e8f8ec;color:#166534;font-weight:600;}
.q-opt.wrong{border-color:#ff3b30;background:#fff0ef;color:#c0392b;}
.q-opt.answered{pointer-events:none;cursor:default;}
/* During quiz: selected = teal only. correct/wrong only shown after submit. */
.q-lbl{width:24px;height:24px;min-width:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#f5f5f7;color:#86868b;transition:all .12s;}
.q-opt.selected .q-lbl{background:var(--acc);color:#fff;}
.q-opt.correct .q-lbl{background:#34c759;color:#fff;}
.q-opt.wrong .q-lbl{background:#ff3b30;color:#fff;}
.q-exp{margin-top:12px;padding:10px 13px;background:#fff8e1;border-left:3px solid #ff9500;border-radius:0 8px 8px 0;font-size:12px;color:#78350f;line-height:1.6;display:none;}
.q-exp.show{display:block;}

/* Submit bar */
.submit-bar{position:sticky;bottom:0;background:rgba(245,245,247,.97);backdrop-filter:blur(10px);border-top:1px solid rgba(0,0,0,0.07);padding:14px 20px;}
.submit-bar-in{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.answered-lbl{font-size:13px;color:#86868b;}
.answered-lbl strong{color:#1d1d1f;}
.btn-submit{padding:11px 28px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.btn-submit:hover{background:#0f766e;}
.btn-submit:disabled{background:#aeaeb2;cursor:default;}

/* ════════ RESULT SCREEN ════════ */
.result-page{max-width:640px;margin:0 auto;padding:40px 20px;}
.result-card{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,0.07);padding:40px 36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.result-emoji{font-size:3.2rem;line-height:1;margin-bottom:14px;}
.result-student{font-size:13px;color:#86868b;margin-bottom:6px;}
.result-score{font-size:4rem;font-weight:900;letter-spacing:-2px;color:var(--acc);line-height:1;}
.result-outof{font-size:14px;color:#86868b;margin-bottom:16px;}
.result-bar-wrap{background:#f0f0f5;border-radius:6px;height:8px;margin-bottom:20px;overflow:hidden;}
.result-bar{height:100%;background:var(--acc);border-radius:6px;transition:width 1s ease;}
.result-grade{display:inline-block;padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:16px;border:1px solid rgba(0,0,0,0.07);}
.result-detail{font-size:12px;color:#86868b;margin-bottom:24px;}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn-retake{padding:10px 20px;background:var(--acc-bg);color:var(--acc);border:1px solid rgba(13,148,136,0.2);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-home{padding:10px 20px;background:#f5f5f7;color:#3a3a3c;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

/* ── Toppers (result page) ── */
.toppers-card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.07);overflow:hidden;margin-top:16px;}
.toppers-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.06);}
.toppers-hdr-title{font-size:13px;font-weight:700;color:#1d1d1f;}
.toppers-count{font-size:11px;color:#86868b;}
.toppers-list{list-style:none;}
.topper-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(0,0,0,0.04);}
.topper-row:last-child{border-bottom:none;}
.topper-rank{font-size:15px;width:24px;text-align:center;flex-shrink:0;}
.topper-info{flex:1;min-width:0;}
.topper-name{font-size:13px;font-weight:600;color:#1d1d1f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topper-bar-wrap{height:3px;background:#f0f0f5;border-radius:3px;margin-top:4px;}
.topper-bar{height:100%;background:var(--acc);border-radius:3px;}
.topper-score{font-size:13px;font-weight:700;color:#1d1d1f;flex-shrink:0;}
.topper-outof{font-size:10px;color:#86868b;}
.toppers-footer{padding:10px 18px;text-align:center;font-size:10px;color:#aeaeb2;border-top:1px solid rgba(0,0,0,0.04);}
.toppers-empty{padding:20px;text-align:center;font-size:12px;color:#aeaeb2;font-style:italic;}
.toppers-loading{padding:20px;text-align:center;font-size:12px;color:#86868b;}

/* ── Error ── */
.error-pg{text-align:center;padding:100px 20px;}
.error-pg h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.error-pg p{color:#86868b;font-size:14px;margin-bottom:20px;}

/* ── Mobile ── */
@media(max-width:500px){
  .login-card,.result-card{padding:28px 18px;}
  .quiz-page{padding:20px 12px 70px;}
  .q-text{font-size:14px;}
  .result-score{font-size:3rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-in">
    <a href="index.html" class="back-link">← All Tests</a>
    <div class="hdr-test-name" id="hdrName">Hinde Classes</div>
    <div class="timer" id="timerEl" style="display:none;">⏱ --:--</div>
  </div>
</header>

<!-- ════ SCREEN: LOGIN ════ -->
<div class="screen active" id="scrLogin">
  <div class="login-page">
    <div class="login-card">
      <div class="login-breadcrumb" id="crumb">Hinde Classes</div>
      <h1 class="login-title">Student Login</h1>
      <div class="login-meta" id="loginMeta"></div>
      <p class="login-desc">Enter your name to start. Your score will be saved to the leaderboard.</p>

      <label class="f-label" for="fName">Full Name</label>
      <input class="f-input" id="fName" type="text" placeholder="Enter your full name" autocomplete="name"/>

      <div id="pwdWrap" style="display:none;">
        <label class="f-label" for="fPwd">Test Password</label>
        <input class="f-input" id="fPwd" type="password" placeholder="Enter test password"
          onkeydown="if(event.key==='Enter')doStart()"/>
      </div>

      <div class="login-error" id="loginErr"></div>
      <button class="btn-unlock" onclick="doStart()">Start Test →</button>
    </div>

    <!-- Toppers shown on login page -->
    <div class="login-toppers" id="loginToppers"></div>
  </div>
</div>

<!-- ════ SCREEN: QUIZ ════ -->
<div class="screen" id="scrQuiz">
  <div class="quiz-page">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div class="progress-lbl" id="progLbl">0 / 0</div>
    </div>
    <div id="qContainer"></div>
  </div>
  <!-- sticky submit bar -->
  <div class="submit-bar">
    <div class="submit-bar-in">
      <div class="answered-lbl">Answered: <strong id="answCount">0</strong> / <strong id="totCount">0</strong></div>
      <button class="btn-submit" id="submitBtn" onclick="doSubmit()" disabled>Submit Test</button>
    </div>
  </div>
</div>

<!-- ════ SCREEN: RESULT ════ -->
<div class="screen" id="scrResult">
  <div class="result-page">
    <div class="result-card">
      <div class="result-emoji" id="resEmoji">🎉</div>
      <div class="result-student" id="resStudent"></div>
      <div class="result-score" id="resScore"></div>
      <div class="result-outof" id="resOutOf"></div>
      <div class="result-bar-wrap"><div class="result-bar" id="resBar" style="width:0%"></div></div>
      <div class="result-grade" id="resGrade"></div>
      <div class="result-detail" id="resDetail"></div>
      <div class="result-btns">
        <button class="btn-retake" onclick="doRetake()">↺ Retake</button>
        <button class="btn-home" onclick="window.location.href='index.html'">← All Tests</button>
      </div>
    </div>
    <div id="resultToppers"></div>
  </div>
</div>

<!-- ════ SCREEN: ERROR ════ -->
<div class="screen" id="scrError">
  <div class="error-pg">
    <h2>Test not found</h2>
    <p id="errMsg">This test doesn't exist or has been removed.</p>
    <a href="index.html" style="color:var(--acc);font-weight:600;">← Back to All Tests</a>
  </div>
</div>

<!-- Config must be one level up -->
<script src="config.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  test.html — Hinde Classes
//  Flow:  Login → Quiz → Result + Save → Toppers
// ══════════════════════════════════════════════════════════════

var CFG       = null;   // test entry from ALL_TESTS
var QDATA     = null;   // loaded question object
var TEST_ID   = "";
var STUDENT   = "";
var ANSWERS   = {};     // { qIndex: chosenOptionIndex }
var TIMER_IV  = null;
var TIME_LEFT = 0;

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", function() {
  var p = new URLSearchParams(window.location.search);
  TEST_ID = p.get("id") || "";

  var all = window.ALL_TESTS || [];
  CFG = all.find(function(t){ return t.id === TEST_ID; });

  if (!CFG) { showErr("Test \"" + TEST_ID + "\" not found in config.js."); return; }

  // Header
  document.getElementById("hdrName").textContent = CFG.title;
  document.getElementById("crumb").textContent   = CFG.subject || "Hinde Classes";

  // Meta pills
  var pills = [];
  if (CFG.questions)  pills.push(CFG.questions + " Q");
  if (CFG.duration)   pills.push("⏱ " + CFG.duration + " min");
  if (CFG.totalMarks) pills.push("🏅 " + CFG.totalMarks + " marks");
  if (CFG.subject)    pills.push(CFG.subject);
  document.getElementById("loginMeta").innerHTML = pills.map(function(x){
    return '<span class="meta-pill">'+x+'</span>';
  }).join("");

  // Password field
  if (CFG.password && CFG.password !== "") {
    document.getElementById("pwdWrap").style.display = "block";
  }

  // Load question file, then show toppers while student logs in
  loadQFile(function() {
    fetchToppers("loginToppers");
  });

  document.getElementById("fName").addEventListener("keydown", function(e){
    if (e.key==="Enter") doStart();
  });
});

// ── LOAD QUESTION FILE ────────────────────────────────────────
// Supports two formats:
//   Format A (existing): var questions = [{id, text, options, answer:"A", ...}]
//   Format B (new):      var TEST_c7mat1 = {questions:[{..., answer:0}], totalMarks, duration}
function loadQFile(cb) {
  if (!CFG.questionsFile) { showErr("questionsFile not set in config.js for: " + TEST_ID); return; }

  // Clear any previous questions variable
  window.questions = undefined;

  var s = document.createElement("script");
  s.src = CFG.questionsFile + "?v=" + Date.now(); // cache-bust
  s.onload = function() {
    var idUC = TEST_ID.replace(/-/g,"_");

    // Format B: TEST_c7mat1 = { questions:[...], totalMarks, duration }
    var wrappers = ["TEST_"+idUC, "TEST_"+TEST_ID, "QUESTIONS_"+idUC, idUC, TEST_ID];
    for (var i = 0; i < wrappers.length; i++) {
      var v = window[wrappers[i]];
      if (v && v.questions) { QDATA = v; break; }
    }

    // Format A (existing repos): var questions = [...]  answer:"A"/"B"/"C"/"D"
    if (!QDATA && Array.isArray(window.questions) && window.questions.length) {
      // Normalise Format A → Format B
      var qs = window.questions.map(function(q) {
        var ansIdx = {"A":0,"B":1,"C":2,"D":3}[String(q.answer).toUpperCase()];
        if (ansIdx === undefined) ansIdx = parseInt(q.answer) || 0;
        return {
          id:          q.id || "",
          text:        q.text || q.question || "",
          options:     q.options || [],
          answer:      ansIdx,
          explanation: q.explanation || q.explain || "",
          marks:       q.marks || 1,
          subject:     q.section || q.subject || CFG.subject || ""
        };
      });
      QDATA = {
        id:          TEST_ID,
        title:       CFG.title,
        questions:   qs,
        totalMarks:  CFG.totalMarks || qs.length,
        duration:    CFG.duration   || 25
      };
    }

    if (!QDATA) {
      showErr("Could not load questions from " + CFG.questionsFile
        + ". File loaded but no recognisable data found.");
      return;
    }
    if (cb) cb();
  };
  s.onerror = function() { showErr("File not found: " + CFG.questionsFile); };
  document.head.appendChild(s);
}

// ── LOGIN → START ─────────────────────────────────────────────
function doStart() {
  var name = document.getElementById("fName").value.trim();
  var pwd  = document.getElementById("fPwd").value.trim();

  if (!name) { showLoginErr("Please enter your full name."); return; }

  if (CFG.password && CFG.password !== "") {
    if (!pwd)              { showLoginErr("Please enter the test password."); return; }
    if (pwd !== CFG.password) { showLoginErr("❌ Wrong password. Ask your teacher."); return; }
  }

  if (!QDATA) { showLoginErr("Questions are still loading. Please wait a moment."); return; }

  STUDENT = name;
  ANSWERS = {};
  renderQuiz();
  showScr("scrQuiz");
  startTimer(CFG.duration * 60);
  document.getElementById("timerEl").style.display = "flex";
}

// ── RENDER QUIZ ───────────────────────────────────────────────
function renderQuiz() {
  var qs  = QDATA.questions || [];
  var con = document.getElementById("qContainer");
  con.innerHTML = "";

  document.getElementById("totCount").textContent  = qs.length;
  document.getElementById("answCount").textContent = 0;
  document.getElementById("submitBtn").disabled = true;

  qs.forEach(function(q, idx) {
    var labels = ["A","B","C","D"];
    var opts = (q.options || []).map(function(opt, j){
      return '<div class="q-opt" id="o'+idx+'_'+j+'" onclick="pick('+idx+','+j+')">'
        +'<div class="q-lbl">'+labels[j]+'</div>'
        +'<div>'+esc(opt)+'</div>'
        +'</div>';
    }).join("");

    var card = document.createElement("div");
    card.className = "q-card";
    card.id = "qc"+idx;
    card.innerHTML =
      '<div class="q-num">Question '+(idx+1)+' / '+qs.length+'</div>'
      +'<div class="q-text">'+esc(q.text)+'</div>'
      +'<div class="q-opts">'+opts+'</div>'
      +(q.explanation ? '<div class="q-exp" id="exp'+idx+'">💡 '+esc(q.explanation)+'</div>' : '');
    con.appendChild(card);
  });

  updateProg();
}

function pick(qIdx, optIdx) {
  var qs = QDATA.questions || [];
  // Allow changing answer before submit — deselect previous
  var prev = ANSWERS[qIdx];
  if (prev !== undefined) {
    var prevEl = document.getElementById("o"+qIdx+"_"+prev);
    if (prevEl) prevEl.classList.remove("selected");
  }

  ANSWERS[qIdx] = optIdx;

  // Just highlight selected — no correct/wrong reveal until submit
  for (var j = 0; j < (qs[qIdx].options||[]).length; j++) {
    var el = document.getElementById("o"+qIdx+"_"+j);
    if (!el) continue;
    el.classList.remove("selected");
  }
  var selEl = document.getElementById("o"+qIdx+"_"+optIdx);
  if (selEl) selEl.classList.add("selected");

  updateProg();
}

function updateProg() {
  var qs  = QDATA.questions || [];
  var done = Object.keys(ANSWERS).length;
  var pct  = qs.length ? Math.round(done/qs.length*100) : 0;
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("progLbl").textContent  = done+" / "+qs.length;
  document.getElementById("answCount").textContent = done;
  document.getElementById("submitBtn").disabled = (done === 0);
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(sec) {
  TIME_LEFT = sec;
  clearInterval(TIMER_IV);
  tickTimer();
  TIMER_IV = setInterval(function(){
    TIME_LEFT--;
    tickTimer();
    if (TIME_LEFT <= 0) { clearInterval(TIMER_IV); doSubmit(); }
  }, 1000);
}

function tickTimer() {
  var m  = Math.floor(TIME_LEFT/60);
  var s  = TIME_LEFT % 60;
  var el = document.getElementById("timerEl");
  el.textContent = "⏱ " + pad(m) + ":" + pad(s);
  if (TIME_LEFT <= 120) el.classList.add("warn"); else el.classList.remove("warn");
}
function pad(n){ return String(n).padStart(2,"0"); }

// ── SUBMIT ────────────────────────────────────────────────────
function doSubmit() {
  clearInterval(TIMER_IV);
  document.getElementById("timerEl").style.display = "none";

  var qs      = QDATA.questions || [];
  var correct = 0;
  var secMap  = {};   // subject → {got, max}

  qs.forEach(function(q, idx){
    var subj = q.subject || CFG.subject || "General";
    if (!secMap[subj]) secMap[subj] = { got:0, max:0 };
    secMap[subj].max += (q.marks || 1);

    if (ANSWERS[idx] === q.answer) {
      correct++;
      secMap[subj].got += (q.marks || 1);
    }
  });

  // Sum up marks for correct answers (each question has marks field, default 1)
  var scored = 0;
  qs.forEach(function(q, idx){
    if (ANSWERS[idx] === q.answer) scored += (q.marks || 1);
  });
  var outOf  = CFG.totalMarks || qs.reduce(function(a,q){ return a+(q.marks||1); }, 0);
  var score  = scored;
  var pct    = Math.round((score / outOf) * 100);

  // Grade
  var emoji, grade, gradeBg;
  if (pct>=90)      { emoji="🏆"; grade="Excellent";   gradeBg="#e8f8ec"; }
  else if (pct>=75) { emoji="🎉"; grade="Very Good";   gradeBg="#f0fdfa"; }
  else if (pct>=60) { emoji="😊"; grade="Good";        gradeBg="#f0f9ff"; }
  else if (pct>=40) { emoji="📚"; grade="Average";     gradeBg="#fffbeb"; }
  else              { emoji="💪"; grade="Keep Trying"; gradeBg="#fff0ef"; }

  document.getElementById("resEmoji").textContent   = emoji;
  document.getElementById("resStudent").textContent = STUDENT;
  document.getElementById("resScore").textContent   = score;
  document.getElementById("resOutOf").textContent   = "out of " + outOf;
  document.getElementById("resDetail").textContent  =
    correct + " correct  ·  " + (qs.length - correct) + " wrong  ·  " + pct + "% scored";

  var gEl = document.getElementById("resGrade");
  gEl.textContent = grade + "  " + emoji;
  gEl.style.background = gradeBg;

  setTimeout(function(){ document.getElementById("resBar").style.width = pct+"%"; }, 100);

  // Now reveal correct/wrong + explanations on all questions
  var qs2 = QDATA.questions || [];
  qs2.forEach(function(q, idx){
    var chosen = ANSWERS[idx];
    for (var j = 0; j < (q.options||[]).length; j++) {
      var el = document.getElementById("o"+idx+"_"+j);
      if (!el) continue;
      el.classList.add("answered");
      el.classList.remove("selected");
      if (j === q.answer)                          el.classList.add("correct");
      else if (j === chosen && chosen !== q.answer) el.classList.add("wrong");
    }
    var expEl = document.getElementById("exp"+idx);
    if (expEl) expEl.classList.add("show");
  });

  showScr("scrResult");

  // Build section scores for sheets
  var secScores = {};
  Object.keys(secMap).forEach(function(k){ secScores[k] = secMap[k].got; });

  saveScore(score, outOf, secScores);
  setTimeout(function(){ fetchToppers("resultToppers"); }, 1800);
}

// ── SAVE SCORE ────────────────────────────────────────────────
// Uses no-cors POST — Apps Script receives it but we can't read response
// This is the correct pattern for GitHub Pages → Google Apps Script
function saveScore(score, outOf, secScores) {
  var url = window.SCRIPT_URL;
  if (!url || url === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    console.warn("SCRIPT_URL not set in config.js");
    return;
  }

  var payload = {
    testId:    TEST_ID,
    testTitle: CFG.title,
    name:      STUDENT,
    timestamp: new Date().toLocaleString("en-IN", { timeZone:"Asia/Kolkata" }),
    total:     score,
    outOf:     outOf,
    scores:    secScores
  };

  // no-cors: bypasses CORS preflight, write succeeds, response opaque (unreadable)
  fetch(url, {
    method:  "POST",
    mode:    "no-cors",
    headers: { "Content-Type":"application/json" },
    body:    JSON.stringify(payload)
  })
  .then(function() {
    console.log("Score submitted (no-cors)");
    // Refresh toppers after short delay to pick up new entry
    setTimeout(function(){ fetchToppers("resultToppers"); }, 3000);
  })
  .catch(function(err){ console.warn("Score save error:", err); });
}

// ── TOPPERS via GET ───────────────────────────────────────────
function fetchToppers(containerId) {
  var el  = document.getElementById(containerId);
  if (!el) return;

  var url = window.SCRIPT_URL;
  if (!url || url === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    el.innerHTML = toppersWrap('<p class="toppers-empty">Leaderboard not configured.</p>');
    return;
  }

  el.innerHTML = toppersWrap('<div class="toppers-loading">⏳ Loading leaderboard...</div>');

  fetch(url + "?testId=" + encodeURIComponent(TEST_ID))
    .then(function(r){ return r.json(); })
    .then(function(res){ renderToppers(res, el); })
    .catch(function(){ el.innerHTML = toppersWrap('<p class="toppers-empty">Could not load leaderboard.</p>'); });
}

function renderToppers(res, el) {
  if (!res || !res.success) {
    el.innerHTML = toppersWrap('<p class="toppers-empty">Leaderboard unavailable.</p>');
    return;
  }

  var data   = res.data  || [];
  var count  = res.count || 0;
  var medals = ["🥇","🥈","🥉"];
  var outOf  = CFG.totalMarks || 0;

  var rows = "";
  if (!data.length) {
    rows = '<p class="toppers-empty">No attempts yet — be the first! 🚀</p>';
  } else {
    data.forEach(function(r, i){
      var max  = outOf || r.total || 1;
      var pct  = Math.round((r.total / max) * 100);
      var rank = i < 3
        ? medals[i]
        : '<span style="width:20px;height:20px;border-radius:50%;background:#f0f0f5;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#3a3a3c;">'+(i+1)+'</span>';

      rows += '<li class="topper-row">'
        +'<div class="topper-rank">'+rank+'</div>'
        +'<div class="topper-info">'
        +'<div class="topper-name">'+esc(r.name)+'</div>'
        +'<div class="topper-bar-wrap"><div class="topper-bar" style="width:'+Math.max(4,pct)+'%"></div></div>'
        +'</div>'
        +'<div class="topper-score">'+r.total+'<span class="topper-outof">/'+max+'</span></div>'
        +'</li>';
    });
  }

  el.innerHTML =
    '<div class="toppers-card">'
    +'<div class="toppers-hdr">'
    +'<span class="toppers-hdr-title">🏆 Top Students — '+esc(CFG.title)+'</span>'
    +'<span class="toppers-count">'+count+' attempted</span>'
    +'</div>'
    +'<ul class="toppers-list">'+rows+'</ul>'
    +(data.length ? '<div class="toppers-footer">Showing top 20 · Updates after each submission</div>' : '')
    +'</div>';
}

function toppersWrap(inner) {
  return '<div class="toppers-card">'+inner+'</div>';
}

// ── RETAKE ────────────────────────────────────────────────────
function doRetake() {
  ANSWERS = {};
  showScr("scrLogin");
  document.getElementById("fName").value = STUDENT;
  document.getElementById("fPwd").value  = "";
  document.getElementById("loginErr").style.display = "none";
  fetchToppers("loginToppers");
}

// ── HELPERS ───────────────────────────────────────────────────
function showScr(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
function showLoginErr(msg) {
  var el = document.getElementById("loginErr");
  el.textContent = msg;
  el.style.display = "block";
}
function showErr(msg) {
  document.getElementById("errMsg").textContent = msg;
  showScr("scrError");
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
