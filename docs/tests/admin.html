<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Hinde Classes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:    #2563eb;
      --blue-dk: #1d4ed8;
      --blue-lt: #eff6ff;
      --amber:   #f59e0b;
      --green:   #16a34a;
      --red:     #dc2626;
      --grey:    #64748b;
      --grey-lt: #f1f5f9;
      --sidebar-w: 270px;
      --white:   #ffffff;
      --text:    #0f172a;
      --text-2:  #475569;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: var(--text); }

    /* ---- HEADER ---- */
    .admin-header {
      background: var(--blue);
      color: #fff;
      padding: 0 1.5rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    .admin-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 700;
    }
    .admin-header a {
      color: rgba(255,255,255,0.8); font-size: 0.82rem;
      text-decoration: none;
    }
    .admin-header a:hover { color: #fff; }

    /* ---- LAYOUT ---- */
    .admin-wrap {
      display: flex;
      margin-top: 56px;
      min-height: calc(100vh - 56px);
    }

    /* ---- SIDEBAR ---- */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid #e2e8f0;
      position: fixed;
      top: 56px; left: 0; bottom: 0;
      overflow-y: auto;
      padding: 1rem 0;
    }
    .sidebar-cat {
      font-size: 0.7rem; font-weight: 700;
      color: var(--grey);
      padding: 0.8rem 1rem 0.3rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .sidebar-item {
      padding: 0.55rem 1rem;
      display: flex; justify-content: space-between; align-items: flex-start;
      cursor: pointer; gap: 0.5rem;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .sidebar-item:hover { background: var(--blue-lt); }
    .sidebar-item.active { background: var(--blue-lt); border-left-color: var(--blue); }
    .sidebar-item.dim { opacity: 0.55; }
    .si-title { font-size: 0.8rem; line-height: 1.35; flex: 1; }
    .si-badge {
      font-size: 0.65rem; font-weight: 700;
      padding: 0.15rem 0.4rem; border-radius: 4px;
      flex-shrink: 0;
    }
    .si-badge.live { background: #dcfce7; color: #15803d; }
    .si-badge.soon { background: #fef9c3; color: #854d0e; }

    /* ---- MAIN ---- */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; padding: 2rem 1.5rem;
    }
    #placeholder {
      text-align: center; padding: 4rem 1rem; color: var(--grey);
    }
    #placeholder h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    #main-panel { display: none; }

    .panel-toprow {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem;
    }
    #panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700;
    }
    .panel-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.4rem 1rem;
      border-radius: 6px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: none;
    }
    .btn-refresh { background: var(--blue-lt); color: var(--blue); }
    .btn-refresh:hover { background: var(--blue); color: #fff; }
    .btn-csv { background: #dcfce7; color: var(--green); }
    .btn-csv:hover { background: var(--green); color: #fff; }

    /* Stats row */
    .stats-row {
      display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .stat-box {
      background: var(--white); border-radius: 10px;
      padding: 0.8rem 1.2rem; min-width: 100px;
      box-shadow: 0 1px 6px rgba(37,99,235,0.07);
      text-align: center; flex: 1;
    }
    .stat-box strong { display: block; font-size: 1.4rem; color: var(--blue); }
    .stat-box span { font-size: 0.72rem; color: var(--grey); }

    /* Merit table */
    .table-wrap { overflow-x: auto; }
    .merit-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.85rem; background: var(--white);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(37,99,235,0.07);
    }
    .merit-table thead tr { background: var(--blue); color: #fff; }
    .merit-table th { padding: 0.65rem 0.9rem; text-align: left; font-size: 0.78rem; font-weight: 600; }
    .merit-table td { padding: 0.55rem 0.9rem; border-bottom: 1px solid #f1f5f9; }
    .merit-table tr:last-child td { border-bottom: none; }
    .merit-table tr.top-row td { background: #fefce8; }
    .merit-table tr:hover td { background: var(--blue-lt); }
    .name-cell { font-weight: 600; }

    #loading-msg { text-align: center; padding: 2rem; color: var(--grey); font-style: italic; }
    .empty-note { color: var(--grey); font-style: italic; padding: 1.5rem; text-align: center; }

    /* Responsive */
    @media (max-width: 640px) {
      .sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid #e2e8f0; }
      .admin-wrap { flex-direction: column; }
      .main { margin-left: 0; padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1>🏫 Hinde Classes — Admin Panel</h1>
    <a href="index.html">← Back to Portal</a>
  </div>

  <div class="admin-wrap">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div id="sidebar-list"></div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div id="placeholder">
        <div style="font-size:3rem;">📊</div>
        <h2>Select a test from the sidebar</h2>
        <p>Click any test to view results and merit list.</p>
      </div>

      <div id="main-panel">
        <div class="panel-toprow">
          <div id="panel-title">Loading...</div>
          <div class="panel-actions">
            <button class="btn-sm btn-refresh" onclick="refreshResults()">🔄 Refresh</button>
            <button class="btn-sm btn-csv" onclick="exportCSV()">📥 Export CSV</button>
          </div>
        </div>

        <div id="loading-msg">⏳ Loading results...</div>

        <div id="results-area" style="display:none">
          <div id="stats-row" class="stats-row"></div>
          <div class="table-wrap">
            <div id="merit-table-wrap"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
