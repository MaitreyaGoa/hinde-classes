<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arithmetic Progression Explorer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#1f2937;padding:20px;min-height:100vh}
  h1{font-size:18px;font-weight:600;color:#0d5c73;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7280;margin-bottom:20px}
  .sliders{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
  .slider-group label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px}
  .slider-group input{width:100%}
  .slider-group .val{text-align:center;font-size:15px;font-weight:600;color:#0d5c73;margin-top:4px}
  .terms-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end;min-height:120px}
  .term-col{text-align:center;flex:1;min-width:36px}
  .term-bar{border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:600;transition:height 0.3s}
  .term-label{font-size:11px;color:#9ca3af;margin-top:4px}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
  .stat{background:white;border-radius:10px;padding:14px;text-align:center;border:1px solid #e5e7eb}
  .stat .name{font-size:11px;color:#9ca3af;margin-bottom:4px}
  .stat .value{font-size:22px;font-weight:600;color:#1f2937}
  .stat .formula{font-size:10px;color:#d1d5db;margin-top:4px}
  canvas{width:100%;border-radius:10px;background:white;border:1px solid #e5e7eb}
</style>
</head>
<body>
<h1>Arithmetic Progression Explorer</h1>
<div class="sub">Adjust values to see the sequence change live</div>
<div class="sliders">
  <div class="slider-group">
    <label>First term (a)</label>
    <input type="range" min="-10" max="20" value="2" step="1" id="a-val">
    <div class="val" id="a-out">a = 2</div>
  </div>
  <div class="slider-group">
    <label>Common difference (d)</label>
    <input type="range" min="-5" max="10" value="3" step="1" id="d-val">
    <div class="val" id="d-out">d = 3</div>
  </div>
  <div class="slider-group">
    <label>Number of terms (n)</label>
    <input type="range" min="3" max="12" value="8" step="1" id="n-val">
    <div class="val" id="n-out">n = 8</div>
  </div>
</div>
<div class="terms-row" id="terms-row"></div>
<div class="stats">
  <div class="stat"><div class="name">nth term (aₙ)</div><div class="value" id="an-out">—</div><div class="formula">a + (n−1)d</div></div>
  <div class="stat"><div class="name">Sum (Sₙ)</div><div class="value" id="sn-out">—</div><div class="formula">n/2 × (2a + (n−1)d)</div></div>
  <div class="stat"><div class="name">Type</div><div class="value" id="type-out">—</div><div class="formula">based on d</div></div>
</div>
<canvas id="chart" height="180"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let chart;
const COLORS=['#0d5c73','#1a7a96','#059669','#7c3aed','#f59e0b','#dc2626','#0d5c73','#1a7a96','#059669','#7c3aed','#f59e0b','#dc2626'];
function update(){
  const a=+document.getElementById('a-val').value;
  const d=+document.getElementById('d-val').value;
  const n=+document.getElementById('n-val').value;
  document.getElementById('a-out').textContent='a = '+a;
  document.getElementById('d-out').textContent='d = '+d;
  document.getElementById('n-out').textContent='n = '+n;
  const terms=[];
  for(let i=0;i<n;i++) terms.push(a+i*d);
  const an=a+(n-1)*d;
  const sn=Math.round(n/2*(2*a+(n-1)*d));
  document.getElementById('an-out').textContent=an;
  document.getElementById('sn-out').textContent=sn;
  document.getElementById('type-out').textContent=d>0?'Increasing':d<0?'Decreasing':'Constant';
  const row=document.getElementById('terms-row');
  row.innerHTML='';
  const maxAbs=Math.max(...terms.map(Math.abs),1);
  terms.forEach((t,i)=>{
    const col=document.createElement('div');
    col.className='term-col';
    col.innerHTML=`<div class="term-bar" style="background:${COLORS[i%COLORS.length]};height:${Math.max(28,Math.abs(t)/maxAbs*80+28)}px">${t}</div><div class="term-label">a${i+1}</div>`;
    row.appendChild(col);
  });
  const labels=terms.map((_,i)=>'a'+(i+1));
  if(chart){chart.data.labels=labels;chart.data.datasets[0].data=terms;chart.data.datasets[0].backgroundColor=terms.map((_,i)=>COLORS[i%COLORS.length]);chart.update();}
  else{chart=new Chart(document.getElementById('chart'),{type:'bar',data:{labels,datasets:[{label:'Term',data:terms,backgroundColor:terms.map((_,i)=>COLORS[i%COLORS.length])}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}});}
}
['a-val','d-val','n-val'].forEach(id=>document.getElementById(id).addEventListener('input',update));
update();
</script>
</body>
</html>
