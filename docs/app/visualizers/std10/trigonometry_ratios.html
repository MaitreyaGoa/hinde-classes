<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trigonometric Ratio Explorer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#1f2937;padding:20px}
  h1{font-size:18px;font-weight:600;color:#0d5c73;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7280;margin-bottom:16px}
  .angle-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .angle-row label{font-size:13px;color:#6b7280}
  .angle-row input{flex:1;min-width:140px}
  .angle-row .val{font-size:18px;font-weight:600;color:#0d5c73;min-width:50px}
  .layout{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
  canvas{border-radius:12px;background:white;border:1px solid #e5e7eb;display:block}
  .right-panel{display:flex;flex-direction:column;gap:10px}
  .ratio-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .ratio-card{background:white;border-radius:10px;padding:14px;text-align:center;border:1px solid #e5e7eb}
  .ratio-card .name{font-size:13px;font-weight:600;margin-bottom:6px}
  .ratio-card .value{font-size:24px;font-weight:600;color:#1f2937}
  .ratio-card .formula{font-size:10px;color:#9ca3af;margin-top:4px}
  .identity-box{background:white;border-radius:10px;padding:14px;border:1px solid #e5e7eb}
  .identity-box .title{font-size:12px;color:#9ca3af;margin-bottom:8px}
  .identity-box .content{font-size:13px;color:#1f2937;line-height:2}
  .trig-table{background:white;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-top:10px}
  .trig-table table{width:100%;font-size:12px;border-collapse:collapse}
  .trig-table th{text-align:center;padding:4px;color:#6b7280;font-weight:600;border-bottom:1px solid #f3f4f6}
  .trig-table td{text-align:center;padding:5px;color:#1f2937}
  .trig-table tr:nth-child(even){background:#f9fafb}
</style>
</head>
<body>
<h1>Trigonometric Ratio Explorer</h1>
<div class="sub">Drag the slider to explore sin, cos and tan on the unit circle</div>
<div class="angle-row">
  <label>Angle (θ)</label>
  <input type="range" min="0" max="360" value="30" step="1" id="angle-sl">
  <span class="val" id="angle-out">30°</span>
</div>
<div class="layout">
  <canvas id="circle-canvas" width="230" height="230"></canvas>
  <div class="right-panel">
    <div class="ratio-cards">
      <div class="ratio-card"><div class="name" style="color:#0d5c73">sin θ</div><div class="value" id="sin-out">0.50</div><div class="formula">opposite / hyp</div></div>
      <div class="ratio-card"><div class="name" style="color:#059669">cos θ</div><div class="value" id="cos-out">0.87</div><div class="formula">adjacent / hyp</div></div>
      <div class="ratio-card"><div class="name" style="color:#dc2626">tan θ</div><div class="value" id="tan-out">0.58</div><div class="formula">sin / cos</div></div>
    </div>
    <div class="identity-box">
      <div class="title">Key identities</div>
      <div class="content" id="identity-out">sin²θ + cos²θ = 1<br>Quadrant: I (all positive)</div>
    </div>
    <div class="trig-table">
      <table>
        <thead><tr><th>θ</th><th>sin</th><th>cos</th><th>tan</th></tr></thead>
        <tbody>
          <tr><td>0°</td><td>0</td><td>1</td><td>0</td></tr>
          <tr><td>30°</td><td>½</td><td>√3/2</td><td>1/√3</td></tr>
          <tr><td>45°</td><td>1/√2</td><td>1/√2</td><td>1</td></tr>
          <tr><td>60°</td><td>√3/2</td><td>½</td><td>√3</td></tr>
          <tr><td>90°</td><td>1</td><td>0</td><td>∞</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('circle-canvas');
const ctx=canvas.getContext('2d');
function drawCircle(deg){
  const rad=deg*Math.PI/180;
  const cx=115,cy=115,r=85;
  ctx.clearRect(0,0,230,230);
  ctx.fillStyle='white';ctx.fillRect(0,0,230,230);
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-r-10,cy);ctx.lineTo(cx+r+10,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-r-10);ctx.lineTo(cx,cy+r+10);ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.stroke();
  const px=cx+r*Math.cos(-rad);
  const py=cy+r*Math.sin(-rad);
  ctx.strokeStyle='#059669';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,cy);ctx.stroke();
  ctx.strokeStyle='#0d5c73';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(px,cy);ctx.lineTo(px,py);ctx.stroke();
  ctx.strokeStyle='#374151';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,py);ctx.stroke();
  ctx.strokeStyle='#dc2626';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,26,0,-rad,rad>0);ctx.stroke();
  ctx.fillStyle='#dc2626';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  const lrad=-rad/2;
  ctx.fillText(deg+'°',cx+38*Math.cos(lrad),cy+38*Math.sin(lrad));
  ctx.fillStyle='#0d5c73';
  ctx.beginPath();ctx.arc(px,py,5,0,2*Math.PI);ctx.fill();
  ctx.fillStyle='#374151';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('('+Math.round(Math.cos(rad)*100)/100+', '+Math.round(Math.sin(rad)*100)/100+')',px+8,py-5);
  ctx.fillStyle='#059669';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('cos',cx+(px-cx)/2,cy+14);
  ctx.fillStyle='#0d5c73';ctx.textAlign='left';
  ctx.fillText('sin',px+5,(cy+py)/2);
}
function getQ(d){if(d>=0&&d<90)return 'I (all +)';if(d>=90&&d<180)return 'II (sin +)';if(d>=180&&d<270)return 'III (tan +)';return 'IV (cos +)';}
function updateTrig(){
  const deg=+document.getElementById('angle-sl').value;
  const rad=deg*Math.PI/180;
  const s=Math.round(Math.sin(rad)*100)/100;
  const c=Math.round(Math.cos(rad)*100)/100;
  const t=Math.abs(Math.cos(rad))<0.01?'∞':Math.round(Math.tan(rad)*100)/100;
  document.getElementById('angle-out').textContent=deg+'°';
  document.getElementById('sin-out').textContent=s;
  document.getElementById('cos-out').textContent=c;
  document.getElementById('tan-out').textContent=t;
  document.getElementById('identity-out').innerHTML='sin²θ + cos²θ = '+(Math.round((s*s+c*c)*100)/100)+'<br>Quadrant: '+getQ(deg);
  drawCircle(deg);
}
document.getElementById('angle-sl').addEventListener('input',updateTrig);
updateTrig();
</script>
</body>
</html>
